<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <!-- 主渐变：翡翠绿从亮到深 -->
    <linearGradient id="emerald" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6dd4a0"/>
      <stop offset="50%" stop-color="#27AE60"/>
      <stop offset="100%" stop-color="#1e9450"/>
    </linearGradient>
    <!-- 叶片亮边渐变 -->
    <linearGradient id="leaf-light" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#aeeac7"/>
      <stop offset="100%" stop-color="#40bf7a"/>
    </linearGradient>
    <!-- 深色模式适配 -->
    <style>
      @media (prefers-color-scheme: dark) {
        .stem { stroke: #6dd4a0; }
        .leaf-l { fill: url(#leaf-light); }
        .leaf-r { fill: #40bf7a; }
        .bud { fill: #6dd4a0; }
      }
    </style>
  </defs>

  <!-- 茎：略带弧度，从底部向上 -->
  <path
    class="stem"
    d="M16 28 C16 22 16 14 16 8"
    fill="none"
    stroke="url(#emerald)"
    stroke-width="2.8"
    stroke-linecap="round"
  />

  <!-- 左叶：不对称曲线，更具动感 -->
  <path
    class="leaf-l"
    d="M16 15 C11 13 8 9 9 5 C14 6 16 10 16 15 Z"
    fill="url(#leaf-light)"
    stroke="#27AE60"
    stroke-width="1"
  />

  <!-- 右叶：略大、更展开 -->
  <path
    class="leaf-r"
    d="M16 13 C21 11 24 7 23 3 C18 4 16 8 16 13 Z"
    fill="#40bf7a"
    stroke="#27AE60"
    stroke-width="1"
  />

  <!-- 芽苞：顶部小圆点 -->
  <circle class="bud" cx="16" cy="7" r="2.2" fill="#27AE60"/>
</svg>
