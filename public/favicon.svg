<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 64 64"
  width="64"
  height="64"
  role="img"
  aria-labelledby="favicon-title"
  shape-rendering="geometricPrecision"
>
  <title id="favicon-title">Xio's</title>

  <!-- Cypress Ink (#123827) — folded-page tile, dark enough for either browser theme. -->
  <path
    d="M15 4h27l18 18v27c0 6.08-4.92 11-11 11H15C8.92 60 4 55.08 4 49V15C4 8.92 8.92 4 15 4Z"
    fill="#123827"
  />

  <!-- Fern Fold (#2D7A52) — the page corner turns the tile into a writing symbol. -->
  <path d="M42 4v11c0 3.87 3.13 7 7 7h11L42 4Z" fill="#2D7A52" />

  <!-- Edge Dew (#B8E4C7) — a restrained hairline keeps the mark clear on dark tabs. -->
  <path
    d="M15 4.75h26.69l17.56 17.56V49c0 5.66-4.59 10.25-10.25 10.25H15C9.34 59.25 4.75 54.66 4.75 49V15C4.75 9.34 9.34 4.75 15 4.75Z"
    fill="none"
    stroke="#B8E4C7"
    stroke-width="1.5"
    stroke-linejoin="round"
    opacity="0.62"
  />

  <!-- Mist Leaf (#E8F4EC) — first paper ribbon. -->
  <path d="M20 12 32 26 26 32 12 20Z" fill="#E8F4EC" />
  <path d="m38 32 14 12-8 8-12-14Z" fill="#E8F4EC" />

  <!-- New Growth (#70D49A) — second ribbon; the open centre is the fold. -->
  <path d="m44 12 8 8-14 12-6-6Z" fill="#70D49A" />
  <path d="m26 32 6 6-12 14-8-8Z" fill="#70D49A" />
</svg>
